<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PADARIA DO Pé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Index.html">
    <link rel="stylesheet" href="sobre.html">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav id="nav" class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
          <a class="navbar-brand" href="index.html">🥖 Padaria do Pé</a>
          <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="Index.html#nav">Inicio</a></li>
              <li class="nav-item"><a class="nav-link" href="Index.html#cardapio">Cardapio</a></li>
              <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
              <li class="nav-item"><a class="nav-link" href="#contato">Contato</a></li>
            </ul>
          </div>
        </div>
      </nav>

    <section id="contato" class="py-5">
        <div class="container">
          <h2 class="text-center mb-4">Entre em contato</h2>
          <div class="row justify-content-center">
            <div class="col-md-6">
              <form>
                <div class="mb-3">
                  <label class="form-label">Nome</label>
                  <input type="text" class="form-control" placeholder="Seu nome">
                </div>
                <div class="mb-3">
                  <label class="form-label">E-mail</label>
                  <input type="email" class="form-control" placeholder="seu@email.com">
                </div>
                <div class="mb-3">
                  <label class="form-label">Mensagem</label>
                  <textarea class="form-control" rows="4" placeholder="Escreva aqui..."></textarea>
                </div>
                <button type="submit" class="btn btn-dark w-100">Enviar</button>
              </form>
            </div>
          </div>
        </div>
      </section>

    <footer class="mb-4">
        <h3>Feito por Locelso00000 : © 2026</h3>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
